name: 提交考核仓库
description: 用这个模板提交你的考核仓库，供评分系统处理。
title: "[submission] <你的 GitHub 用户名> - <题目仓库名>"
labels:
  - submission
body:
  - type: markdown
    attributes:
      value: |
        请按要求填写下面的信息。

        注意：
        - 不要修改题目仓库名
        - 仓库地址请填写你自己的提交仓库完整链接
        - 如果有未完成部分，请在备注中说明

  - type: input
    id: github_username
    attributes:
      label: GitHub 用户名
      description: 请填写你自己的 GitHub 用户名
      placeholder: your-github-username
    validations:
      required: true

  - type: dropdown
    id: task_repo
    attributes:
      label: 题目仓库名
      description: 请选择你提交的是哪一道题
      options:
        - dev-2026-01
        - dev-2026-02
        - dev-2026-03
        - dev-2026-04
        - dev-2026-05
    validations:
      required: true

  - type: input
    id: submission_repo
    attributes:
      label: 你的提交仓库地址
      description: 请填写你自己的 GitHub 仓库完整地址
      placeholder: https://github.com/your-name/dev-2026-01
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 备注
      description: 如果有没做完的部分，可以提前说明
      placeholder: 例如：README 还没完善 / 第三个功能还没完成
    validations:
      required: false
